<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">

<title>Честит Рожден Ден - Онлайн Картичка 🎂</title>

<meta name="description"
content="Безплатна онлайн картичка за рожден ден с конфети, музика и пожелания.">

<meta name="keywords"
content="рожден ден, честит рожден ден, картичка, поздрав, пожелание">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff6b6b,#ffb347,#ffd93d);
    font-family:Arial,sans-serif;
    overflow:hidden;
      animation:bg 6s infinite alternate;

        background:
        linear-gradient(
            rgba(0,0,0,.25),
            rgba(0,0,0,.25)
        ),
        url("birthdayyy.avif") no-repeat;

    background-size:cover;
    background-position:center;
}

@keyframes bg{
    from{filter:hue-rotate(0deg);}
    to{filter:hue-rotate(30deg);}
}

.container{
    text-align:center;
    color:white;
    padding:20px;
}

h1{
    font-size:4rem;
    animation:pop 1.5s infinite alternate;
    text-shadow:0 0 20px rgba(0,0,0,.2);
}

p{
    font-size:1.4rem;
    margin-top:20px;
}

button{
    margin-top:15px;
    padding:15px 30px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff6b6b;
    font-size:1rem;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.1);
}

.hidden{
    display:none;
}

.message{
    margin-top:30px;
    font-size:1.5rem;
    animation:fadeIn 1s ease;
}

/* confetti */
.confetti{
    position:absolute;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

@keyframes pop{
    from{transform:scale(1);}
    to{transform:scale(1.1);}
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

@media (max-width: 600px){

    .container{
        padding:20px 15px;
        width:100%;
    }

    h1{
        font-size:2.2rem;
        line-height:1.2;
    }

    p{
        font-size:1.1rem;
    }

    .message{
        font-size:1.1rem;
        line-height:1.5;
    }

    button{
        width:100%;
        max-width:280px;
        font-size:1rem;
        padding:14px 20px;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>🎂 Честит Рожден Ден!</h1>

    <p>Днес е специален ден!</p>

    
    <button id="surpriseBtn" onclick="showMessage()">
        🎁 Изненада
    </button>
<!-- 
    <button onclick="shareLink()">
        🔗 Сподели
    </button> -->

    <div id="msg" class="message hidden">
        ✨ Пожелавам ти здраве, щастие, късмет и безброй поводи за усмивки!<br><br>
        Нека всяка твоя мечта намери път към реалността. 🎉
    </div>

</div>

<script>

// 🎉 показване на пожелание + конфети

function showMessage(){

    document.getElementById("msg").classList.remove("hidden");

    // 👏 пуска аплодисменти от файла
    const applause = document.getElementById("applause");
    applause.currentTime = 0; // рестарт (много важно)
    applause.play().catch(()=>{});

    // 🎉 конфети
    for(let i=0;i<150;i++){
        const conf=document.createElement("div");
        conf.classList.add("confetti");

        conf.style.left=Math.random()*100+"vw";
        conf.style.background=`hsl(${Math.random()*360},100%,50%)`;
        conf.style.animationDuration=(Math.random()*3+2)+"s";

        document.body.appendChild(conf);

        setTimeout(()=>conf.remove(),5000);
    }
    document.getElementById("surpriseBtn").style.display = "none";
}
// 🔗 споделяне на линк
function shareLink(){

    navigator.clipboard.writeText(window.location.href);

    alert("Линкът е копиран 🎉 Сподели го!");

    navigator.share({
  title: "Честит Рожден Ден 🎂",
  url: window.location.href
});
}

async function shareLink(){

    if(navigator.share){
        try{
            await navigator.share({
                title:"Честит Рожден Ден 🎂",
                text:"Празнична изненада 🎉",
                url:window.location.href
            });
        }catch(e){}
    }else{
        navigator.clipboard.writeText(window.location.href);
        alert("Линкът е копиран 🎉");
    }
}



</script>
<audio id="applause">
    <source src="applause.mp3" type="audio/mpeg">
</audio>
</body>
</html>
